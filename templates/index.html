<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodyyy - Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.1rem;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .search-box:focus-within {
            border-color: #e94560;
        }

        .search-box input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border: none;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .search-box button:hover {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 120px;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .song-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .song-info {
            padding: 15px;
        }

        .song-info h3 {
            font-size: 1rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-info p {
            color: #888;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-play {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: #fff;
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid #e94560;
        }

        .btn-delete {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }

        .in-library {
            display: inline-block;
            background: #4ade80;
            color: #000;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        /* Player */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player.hidden {
            display: none;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
        }

        .player-info img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .player-info .details h4 {
            font-size: 0.95rem;
        }

        .player-info .details p {
            color: #888;
            font-size: 0.8rem;
        }

        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .control-btn:hover {
            color: #e94560;
        }

        .control-btn.play-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 5px;
            width: 0%;
        }

        .time {
            font-size: 0.8rem;
            color: #888;
            min-width: 40px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #e94560;
            border-radius: 50%;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #fff;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(233, 69, 96, 0.9);
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Melodyyy</h1>
            <p>Search, Download & Play Music</p>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for songs, artists..." onkeypress="handleKeyPress(event)">
                <button onclick="search()">Search</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">Search Results</button>
            <button class="tab" onclick="switchTab('library')">My Library</button>
        </div>

        <div id="content" class="results-container">
            <div class="empty-state">
                <h3>Start by searching for music</h3>
                <p>Type a song name or artist to get started</p>
            </div>
        </div>
    </div>

    <!-- Audio Player -->
    <div id="player" class="player hidden">
        <div class="player-info">
            <img id="playerThumbnail" src="" alt="Album Art">
            <div class="details">
                <h4 id="playerTitle">Song Title</h4>
                <p id="playerArtist">Artist</p>
            </div>
        </div>
        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn play-btn" onclick="togglePlay()">
                    <span id="playIcon">▶</span>
                </button>
            </div>
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="time" id="duration">0:00</span>
            </div>
        </div>
        <div class="volume-control">
            <span>🔊</span>
            <input type="range" class="volume-slider" min="0" max="100" value="100" onchange="setVolume(this.value)">
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        let currentTab = 'search';
        let searchResults = [];
        let library = [];
        let currentSong = null;
        const audio = document.getElementById('audio');

        // Audio event listeners
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => {
            document.getElementById('playIcon').textContent = '▶';
        });
        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('duration').textContent = formatTime(audio.duration);
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                search();
            }
        }

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            showLoading();
            
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                searchResults = data.results;
                currentTab = 'search';
                updateTabs();
                renderResults();
            } catch (error) {
                showNotification('Search failed. Please try again.');
                console.error(error);
            }
        }

        async function loadLibrary() {
            showLoading();
            
            try {
                const response = await fetch('/api/library');
                const data = await response.json();
                library = data.songs;
                renderLibrary();
                
                // Auto-refresh if any songs are still processing
                const processing = library.filter(s => s.processing_status === 'processing');
                if (processing.length > 0 && currentTab === 'library') {
                    setTimeout(loadLibrary, 10000); // Refresh every 10 seconds
                }
            } catch (error) {
                showNotification('Failed to load library.');
                console.error(error);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            updateTabs();
            
            if (tab === 'library') {
                loadLibrary();
            } else {
                renderResults();
            }
        }

        function updateTabs() {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && currentTab === 'search') || (i === 1 && currentTab === 'library'));
            });
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading" style="grid-column: 1 / -1;">
                    <div class="spinner"></div>
                </div>
            `;
        }

        function renderResults() {
            const container = document.getElementById('content');
            
            if (searchResults.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No results found</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = searchResults.map((song, index) => `
                <div class="song-card">
                    <img src="${song.thumbnail_url || 'https://via.placeholder.com/300x180?text=No+Image'}" alt="${escapeHtml(song.title)}">
                    <div class="song-info">
                        ${song.in_library && song.processing_status === 'completed' ? '<span class="in-library">✓ In Library</span>' : ''}
                        ${song.processing_status === 'processing' ? '<span class="in-library" style="background:#fbbf24;">⏳ Processing</span>' : ''}
                        <h3 title="${escapeHtml(song.title)}">${escapeHtml(song.title)}</h3>
                        <p title="${escapeHtml(song.artist || 'Unknown Artist')}">${escapeHtml(song.artist || 'Unknown Artist')}</p>
                        <p>${song.duration ? formatTime(song.duration) : ''}${song.view_count ? ' • ' + formatViews(song.view_count) + ' views' : ''}</p>
                        <div class="song-actions">
                            ${song.in_library && song.processing_status === 'completed'
                                ? `<button class="btn btn-play" onclick="playSearchResult(${index})">▶ Play</button>`
                                : song.processing_status === 'processing'
                                    ? `<button class="btn btn-download" disabled>⏳ Processing...</button>`
                                    : `<button class="btn btn-download" onclick="downloadSearchResult(${index})">⬇ Process</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderLibrary() {
            const container = document.getElementById('content');
            
            if (library.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>Your library is empty</h3>
                        <p>Search and download some songs to build your collection</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = library.map((song, index) => `
                <div class="song-card">
                    <img src="${song.thumbnail_url || 'https://via.placeholder.com/300x180?text=No+Image'}" alt="${escapeHtml(song.title)}">
                    <div class="song-info">
                        ${song.processing_status === 'completed' ? '<span class="in-library">✓ Ready</span>' : ''}
                        ${song.processing_status === 'processing' ? '<span class="in-library" style="background:#fbbf24;">⏳ Processing</span>' : ''}
                        ${song.processing_status === 'failed' ? '<span class="in-library" style="background:#ef4444;">✗ Failed</span>' : ''}
                        <h3 title="${escapeHtml(song.title)}">${escapeHtml(song.title)}</h3>
                        <p title="${escapeHtml(song.artist || 'Unknown Artist')}">${escapeHtml(song.artist || 'Unknown Artist')}</p>
                        <p>${song.duration ? formatTime(song.duration) : ''}</p>
                        <div class="song-actions">
                            ${song.processing_status === 'completed' 
                                ? `<button class="btn btn-play" onclick="playLibrarySong(${index})">▶ Play</button>`
                                : `<button class="btn btn-download" disabled>⏳ Processing...</button>`
                            }
                            <button class="btn btn-delete" onclick="deleteSong('${song.youtube_id}')">🗑</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function downloadSong(song) {
            showNotification('Processing... This may take a few minutes.');
            
            try {
                // Start processing
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: song.title
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.song) {
                        // Already processed
                        showNotification('Song ready! ✓');
                        searchResults = searchResults.map(s => 
                            s.youtube_id === song.youtube_id ? {...s, in_library: true} : s
                        );
                        renderResults();
                        playSong(data.song);
                    } else {
                        // Processing started in background
                        showNotification('Processing started! Check library in a few minutes.');
                        pollProcessingStatus(data.youtube_id || song.youtube_id);
                    }
                } else {
                    showNotification('Processing failed. Please try again.');
                }
            } catch (error) {
                showNotification('Processing failed. Please try again.');
                console.error(error);
            }
        }

        async function pollProcessingStatus(youtubeId) {
            // Poll for processing status
            const checkStatus = async () => {
                try {
                    const response = await fetch(`/api/process/status/${youtubeId}`);
                    if (response.ok) {
                        const status = await response.json();
                        if (status.status === 'completed') {
                            showNotification('Song processed! ✓');
                            // Refresh library
                            if (currentTab === 'library') {
                                loadLibrary();
                            } else {
                                // Update search results
                                searchResults = searchResults.map(s => 
                                    s.youtube_id === youtubeId ? {...s, in_library: true, processing_status: 'completed'} : s
                                );
                                renderResults();
                            }
                            return;
                        } else if (status.status === 'failed') {
                            showNotification('Processing failed.');
                            return;
                        }
                    }
                    // Keep polling
                    setTimeout(checkStatus, 5000);
                } catch (error) {
                    console.error('Status check error:', error);
                }
            };
            
            setTimeout(checkStatus, 5000);
        }

        async function deleteSong(youtubeId) {
            if (!confirm('Are you sure you want to delete this song?')) return;
            
            try {
                const response = await fetch(`/api/song/${youtubeId}`, { method: 'DELETE' });
                
                if (response.ok) {
                    showNotification('Song deleted');
                    loadLibrary();
                    
                    // Stop playing if this song was playing
                    if (currentSong && currentSong.youtube_id === youtubeId) {
                        audio.pause();
                        document.getElementById('player').classList.add('hidden');
                        currentSong = null;
                    }
                }
            } catch (error) {
                showNotification('Failed to delete song.');
                console.error(error);
            }
        }

        function playSong(song) {
            currentSong = song;
            
            // Update player UI
            document.getElementById('player').classList.remove('hidden');
            document.getElementById('playerThumbnail').src = song.thumbnail_url || 'https://via.placeholder.com/50?text=♪';
            document.getElementById('playerTitle').textContent = song.title;
            document.getElementById('playerArtist').textContent = song.artist || 'Unknown Artist';
            
            // Load and play audio
            audio.src = `/api/play/${song.youtube_id}`;
            audio.play();
            document.getElementById('playIcon').textContent = '⏸';
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('playIcon').textContent = '⏸';
            } else {
                audio.pause();
                document.getElementById('playIcon').textContent = '▶';
            }
        }

        function updateProgress() {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        }

        function seek(event) {
            const bar = event.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function setVolume(value) {
            audio.volume = value / 100;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatViews(views) {
            if (views >= 1000000000) return (views / 1000000000).toFixed(1) + 'B';
            if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views.toString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function playSearchResult(index) {
            if (searchResults[index]) {
                playSong(searchResults[index]);
            }
        }

        function downloadSearchResult(index) {
            if (searchResults[index]) {
                downloadSong(searchResults[index]);
            }
        }

        function playLibrarySong(index) {
            if (library[index]) {
                playSong(library[index]);
            }
        }

        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }

        // Load library on page load
        loadLibrary();
    </script>
</body>
</html>
